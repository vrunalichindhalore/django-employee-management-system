{% load static %}

<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Employee</title>

```
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet">

<style>
    body{
        background:#f4f6f9;
    }

    .edit-card{
        max-width:600px;
        margin:50px auto;
        padding:30px;
        border-radius:15px;
        background:white;
        box-shadow:0px 5px 15px rgba(0,0,0,0.1);
    }

    h2{
        text-align:center;
        margin-bottom:25px;
    }

    .btn{
        width:100%;
    }
</style>
```

</head>
<body>

<div class="container">
    <div class="edit-card">

```
    <h2>Edit Employee</h2>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">First Name</label>
            <input type="text"
                   name="first_name"
                   value="{{ employee.first_name }}"
                   class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Last Name</label>
            <input type="text"
                   name="last_name"
                   value="{{ employee.last_name }}"
                   class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email"
                   name="email"
                   value="{{ employee.email }}"
                   class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Phone Number</label>
            <input type="text"
                   name="phone_number"
                   value="{{ employee.phone_number }}"
                   class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Designation</label>
            <input type="text"
                   name="designation"
                   value="{{ employee.designation }}"
                   class="form-control">
        </div>

        <button type="submit"
                class="btn btn-success">
            Update Employee
        </button>

    </form>

</div>
```

</div>

</body>
</html>
